title: Pharos
description: A native macOS PostgreSQL client
baseurl: "/Pharos"
url: "https://neodymiumphish.github.io"

remote_theme: just-the-docs/just-the-docs
color_scheme: dark
search_enabled: true
search.heading_level: 3

logo: "/Pharos/assets/images/pharos-logo.png"

aux_links:
  "GitHub":
    - "https://github.com/NeodymiumPhish/Pharos"

aux_links_new_tab: true
nav_sort: case_insensitive
heading_anchors: true

callouts:
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red

footer_content: "Pharos &mdash; A native macOS PostgreSQL client built with Swift and Rust."

exclude:
  - Gemfile
  - Gemfile.lock
