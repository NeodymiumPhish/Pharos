name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pharos-core -> pharos-core/target"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Pharos/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Pharos/App/Info.plist
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" pharos-core/Cargo.toml

      - name: Build Rust library
        run: |
          cd pharos-core
          cargo build --release

      - name: Build Xcode project
        env:
          PHAROS_CI: "1"
        run: |
          xcodebuild build \
            -project Pharos.xcodeproj \
            -scheme Pharos \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath ./build

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Pharos" \
            -srcfolder ./build/Build/Products/Release/Pharos.app \
            -ov -format UDZO \
            "Pharos-${GITHUB_REF_NAME}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: "*.dmg"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true

      - name: Trigger Homebrew tap update
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -X POST \
            -H "Authorization: token $HOMEBREW_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/NeodymiumPhish/homebrew-Pharos/dispatches \
            -d "{\"event_type\": \"release-published\", \"client_payload\": {\"version\": \"$VERSION\"}}"
