name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pharos-core -> pharos-core/target"

      - name: Add Intel Rust target
        run: rustup target add x86_64-apple-darwin

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Pharos/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Pharos/App/Info.plist
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" pharos-core/Cargo.toml

      - name: Build Rust library (universal)
        run: |
          cd pharos-core
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/libpharos_core.a \
            target/x86_64-apple-darwin/release/libpharos_core.a \
            -output target/release/libpharos_core.a

      - name: Build Xcode project (universal)
        env:
          PHAROS_CI: "1"
        run: |
          xcodebuild build \
            -project Pharos.xcodeproj \
            -scheme Pharos \
            -configuration Release \
            ARCHS="arm64 x86_64" \
            CODE_SIGN_IDENTITY="-" \
            -derivedDataPath ./build

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Pharos" \
            -srcfolder ./build/Build/Products/Release/Pharos.app \
            -ov -format UDZO \
            "Pharos-${GITHUB_REF_NAME}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: dmg
          path: "*.dmg"

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v5
        with:
          name: dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true

      - name: Trigger Homebrew tap update
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -X POST \
            -H "Authorization: token $HOMEBREW_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/NeodymiumPhish/homebrew-Pharos/dispatches \
            -d "{\"event_type\": \"release-published\", \"client_payload\": {\"version\": \"$VERSION\"}}"
